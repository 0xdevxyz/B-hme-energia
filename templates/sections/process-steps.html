<section class="section-process-steps" data-section-type="process-steps" style="background:#f8fafc;padding:4rem 1rem;">
  <div style="max-width:900px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <span style="display:inline-block;background:#ede9fe;color:#6d28d9;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:0.3rem 0.9rem;border-radius:999px;margin-bottom:0.75rem;" data-editable="text" data-key="process_section_tag">{{process_section_tag}}</span>
      <h2 style="font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:#111;margin:0 0 0.75rem;" data-editable="text" data-key="process_headline">{{process_headline}}</h2>
      <p style="color:#555;font-size:1rem;max-width:540px;margin:0 auto;" data-editable="text" data-key="process_subline">{{process_subline}}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2rem;margin-bottom:2.5rem;">
      <div style="text-align:center;">
        <div style="width:56px;height:56px;background:#1a56db;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;margin:0 auto 1rem;">1</div>
        <h3 style="font-size:1.1rem;font-weight:700;color:#111;margin:0 0 0.5rem;" data-editable="text" data-key="process_step_1_title">{{process_step_1_title}}</h3>
        <p style="color:#555;font-size:0.9rem;line-height:1.6;" data-editable="text" data-key="process_step_1_text">{{process_step_1_text}}</p>
      </div>
      <div style="text-align:center;">
        <div style="width:56px;height:56px;background:#1a56db;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;margin:0 auto 1rem;">2</div>
        <h3 style="font-size:1.1rem;font-weight:700;color:#111;margin:0 0 0.5rem;" data-editable="text" data-key="process_step_2_title">{{process_step_2_title}}</h3>
        <p style="color:#555;font-size:0.9rem;line-height:1.6;" data-editable="text" data-key="process_step_2_text">{{process_step_2_text}}</p>
      </div>
      <div style="text-align:center;">
        <div style="width:56px;height:56px;background:#1a56db;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;margin:0 auto 1rem;">3</div>
        <h3 style="font-size:1.1rem;font-weight:700;color:#111;margin:0 0 0.5rem;" data-editable="text" data-key="process_step_3_title">{{process_step_3_title}}</h3>
        <p style="color:#555;font-size:0.9rem;line-height:1.6;" data-editable="text" data-key="process_step_3_text">{{process_step_3_text}}</p>
      </div>
    </div>
    <div style="text-align:center;">
      <a href="tel:{{phone}}" style="display:inline-flex;align-items:center;gap:0.5rem;background:#1a56db;color:#fff;text-decoration:none;padding:0.8rem 2rem;border-radius:8px;font-weight:700;font-size:1rem;">
        <span>📞</span>
        <span data-editable="text" data-key="process_cta">{{process_cta}}</span>
      </a>
    </div>
  </div>
</section>
