<section class="section-cta-band" data-section-type="cta-band" style="background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%);padding:3.5rem 1rem;color:#fff;text-align:center;">
  <div style="max-width:700px;margin:0 auto;">
    <h2 style="font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;margin:0 0 0.75rem;color:#fff;" data-editable="text" data-key="cta_band_headline">{{cta_band_headline}}</h2>
    <p style="font-size:1.05rem;color:#bfdbfe;margin:0 0 2rem;line-height:1.6;" data-editable="text" data-key="cta_band_subtext">{{cta_band_subtext}}</p>
    <div style="display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;">
      <a href="tel:{{phone}}" style="display:inline-flex;align-items:center;gap:0.5rem;background:#fff;color:#1a56db;text-decoration:none;padding:0.85rem 2rem;border-radius:8px;font-weight:800;font-size:1.05rem;">
        <span>📞</span> <span data-editable="text" data-key="cta_band_phone_label">{{cta_band_phone_label}}</span>
      </a>
      <a href="#kontakt" style="display:inline-flex;align-items:center;gap:0.5rem;background:transparent;color:#fff;text-decoration:none;padding:0.85rem 2rem;border-radius:8px;font-weight:700;font-size:1.05rem;border:2px solid rgba(255,255,255,0.5);">
        <span data-editable="text" data-key="cta_band_secondary_label">{{cta_band_secondary_label}}</span>
      </a>
    </div>
  </div>
</section>
