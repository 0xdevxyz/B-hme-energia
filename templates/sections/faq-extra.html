<section class="section-faq-extra" data-section-type="faq-extra" style="background:#fff;padding:4rem 1rem;">
  <div style="max-width:780px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <span style="display:inline-block;background:#f0fdf4;color:#15803d;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:0.3rem 0.9rem;border-radius:999px;margin-bottom:0.75rem;" data-editable="text" data-key="faq_extra_section_tag">{{faq_extra_section_tag}}</span>
      <h2 style="font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:#111;margin:0 0 0.75rem;" data-editable="text" data-key="faq_extra_headline">{{faq_extra_headline}}</h2>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.75rem;">
      <details style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
        <summary style="padding:1rem 1.25rem;font-weight:600;color:#111;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;" data-editable="text" data-key="faq_extra_1_q">{{faq_extra_1_q}} <span style="font-size:1.25rem;color:#6b7280;">+</span></summary>
        <div style="padding:0 1.25rem 1rem;color:#555;line-height:1.65;" data-editable="text" data-key="faq_extra_1_a">{{faq_extra_1_a}}</div>
      </details>
      <details style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
        <summary style="padding:1rem 1.25rem;font-weight:600;color:#111;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;" data-editable="text" data-key="faq_extra_2_q">{{faq_extra_2_q}} <span style="font-size:1.25rem;color:#6b7280;">+</span></summary>
        <div style="padding:0 1.25rem 1rem;color:#555;line-height:1.65;" data-editable="text" data-key="faq_extra_2_a">{{faq_extra_2_a}}</div>
      </details>
      <details style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
        <summary style="padding:1rem 1.25rem;font-weight:600;color:#111;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;" data-editable="text" data-key="faq_extra_3_q">{{faq_extra_3_q}} <span style="font-size:1.25rem;color:#6b7280;">+</span></summary>
        <div style="padding:0 1.25rem 1rem;color:#555;line-height:1.65;" data-editable="text" data-key="faq_extra_3_a">{{faq_extra_3_a}}</div>
      </details>
      <details style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
        <summary style="padding:1rem 1.25rem;font-weight:600;color:#111;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;" data-editable="text" data-key="faq_extra_4_q">{{faq_extra_4_q}} <span style="font-size:1.25rem;color:#6b7280;">+</span></summary>
        <div style="padding:0 1.25rem 1rem;color:#555;line-height:1.65;" data-editable="text" data-key="faq_extra_4_a">{{faq_extra_4_a}}</div>
      </details>
    </div>
    <div style="text-align:center;margin-top:2rem;">
      <p style="color:#555;margin-bottom:1rem;">Noch Fragen? Wir helfen Ihnen gerne persönlich.</p>
      <a href="tel:{{phone}}" style="display:inline-flex;align-items:center;gap:0.5rem;background:#1a56db;color:#fff;text-decoration:none;padding:0.75rem 1.75rem;border-radius:8px;font-weight:700;font-size:1rem;">
        <span>📞</span> <span>Jetzt anrufen: {{phone}}</span>
      </a>
    </div>
  </div>
</section>
