<section class="section-before-after" data-section-type="before-after" style="background:#fff;padding:4rem 1rem;">
  <div style="max-width:900px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <span style="display:inline-block;background:#fce7f3;color:#9d174d;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:0.3rem 0.9rem;border-radius:999px;margin-bottom:0.75rem;" data-editable="text" data-key="before_after_section_tag">{{before_after_section_tag}}</span>
      <h2 style="font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:#111;margin:0 0 0.75rem;" data-editable="text" data-key="before_after_headline">{{before_after_headline}}</h2>
      <p style="color:#555;font-size:1rem;max-width:540px;margin:0 auto;" data-editable="text" data-key="before_after_subline">{{before_after_subline}}</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2.5rem;">
      <div>
        <div style="background:#fee2e2;border-radius:10px;padding:0.5rem;text-align:center;margin-bottom:1rem;">
          <span style="font-weight:700;color:#b91c1c;font-size:0.9rem;text-transform:uppercase;">Vorher</span>
        </div>
        <div style="background:#f9fafb;border-radius:10px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:0.85rem;">
          <img src="{{before_image}}" alt="Vorher – {{before_after_headline}}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="this.style.display='none'">
        </div>
        <p style="margin-top:0.75rem;color:#555;font-size:0.9rem;line-height:1.55;" data-editable="text" data-key="before_after_before_text">{{before_after_before_text}}</p>
      </div>
      <div>
        <div style="background:#dcfce7;border-radius:10px;padding:0.5rem;text-align:center;margin-bottom:1rem;">
          <span style="font-weight:700;color:#15803d;font-size:0.9rem;text-transform:uppercase;">Nachher</span>
        </div>
        <div style="background:#f9fafb;border-radius:10px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:0.85rem;">
          <img src="{{after_image}}" alt="Nachher – {{before_after_headline}}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="this.style.display='none'">
        </div>
        <p style="margin-top:0.75rem;color:#555;font-size:0.9rem;line-height:1.55;" data-editable="text" data-key="before_after_after_text">{{before_after_after_text}}</p>
      </div>
    </div>
    <div style="text-align:center;">
      <p style="color:#555;margin-bottom:1rem;font-size:1rem;" data-editable="text" data-key="before_after_cta_text">{{before_after_cta_text}}</p>
      <a href="tel:{{phone}}" style="display:inline-flex;align-items:center;gap:0.5rem;background:#1a56db;color:#fff;text-decoration:none;padding:0.8rem 2rem;border-radius:8px;font-weight:700;font-size:1rem;">
        <span>📞</span> <span>Jetzt anrufen: {{phone}}</span>
      </a>
    </div>
  </div>
</section>
