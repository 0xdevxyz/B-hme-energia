<section class="section-testimonials" data-section-type="testimonials" style="background:#f8fafc;padding:4rem 1rem;">
  <div style="max-width:900px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <span style="display:inline-block;background:#e0f2fe;color:#0369a1;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:0.3rem 0.9rem;border-radius:999px;margin-bottom:0.75rem;" data-editable="text" data-key="testimonials_section_tag">{{testimonials_section_tag}}</span>
      <h2 style="font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:#111;margin:0 0 0.75rem;" data-editable="text" data-key="testimonials_headline">{{testimonials_headline}}</h2>
      <p style="color:#555;font-size:1rem;max-width:540px;margin:0 auto;" data-editable="text" data-key="testimonials_subline">{{testimonials_subline}}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;">
      <div style="background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.07);">
        <div style="color:#f59e0b;font-size:1.1rem;margin-bottom:0.5rem;">★★★★★</div>
        <p style="color:#333;font-size:0.95rem;line-height:1.6;margin-bottom:1rem;font-style:italic;" data-editable="text" data-key="testimonial_1_text">"{{testimonial_1_text}}"</p>
        <strong style="font-size:0.9rem;color:#111;" data-editable="text" data-key="testimonial_1_name">{{testimonial_1_name}}</strong>
      </div>
      <div style="background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.07);">
        <div style="color:#f59e0b;font-size:1.1rem;margin-bottom:0.5rem;">★★★★★</div>
        <p style="color:#333;font-size:0.95rem;line-height:1.6;margin-bottom:1rem;font-style:italic;" data-editable="text" data-key="testimonial_2_text">"{{testimonial_2_text}}"</p>
        <strong style="font-size:0.9rem;color:#111;" data-editable="text" data-key="testimonial_2_name">{{testimonial_2_name}}</strong>
      </div>
      <div style="background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.07);">
        <div style="color:#f59e0b;font-size:1.1rem;margin-bottom:0.5rem;">★★★★★</div>
        <p style="color:#333;font-size:0.95rem;line-height:1.6;margin-bottom:1rem;font-style:italic;" data-editable="text" data-key="testimonial_3_text">"{{testimonial_3_text}}"</p>
        <strong style="font-size:0.9rem;color:#111;" data-editable="text" data-key="testimonial_3_name">{{testimonial_3_name}}</strong>
      </div>
    </div>
    <div style="text-align:center;margin-top:2rem;">
      <a href="tel:{{phone}}" style="display:inline-flex;align-items:center;gap:0.5rem;background:#1a56db;color:#fff;text-decoration:none;padding:0.75rem 1.75rem;border-radius:8px;font-weight:700;font-size:1rem;">
        <span>📞</span>
        <span data-editable="text" data-key="testimonials_cta">{{testimonials_cta}}</span>
      </a>
    </div>
  </div>
</section>
