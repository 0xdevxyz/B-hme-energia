version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: boehme-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - boehme-network

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    container_name: boehme-cms
    restart: unless-stopped
    environment:
      DATABASE_URI: mongodb://admin:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/boehme?authSource=admin
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NODE_ENV: production
      PORT: 3000
      PAYLOAD_PUBLIC_SERVER_URL: ${CMS_URL}
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - boehme-network
    volumes:
      - ./apps/cms/media:/app/media

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: boehme-web
    restart: unless-stopped
    environment:
      PUBLIC_CMS_URL: ${CMS_URL}
    ports:
      - "3001:3000"
    depends_on:
      - cms
    networks:
      - boehme-network

volumes:
  mongo_data:

networks:
  boehme-network:
    driver: bridge
