version: '3.8'

services:
  # Für lokale Entwicklung nur — Production nutzt MongoDB Atlas!
  # mongo:
  #   image: mongo:7
  #   container_name: boehme-mongo
  #   restart: unless-stopped
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: password
  #   volumes:
  #     - mongo_data:/data/db
  #   ports:
  #     - "27017:27017"
  #   networks:
  #     - boehme-network

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    container_name: boehme-cms
    restart: unless-stopped
    environment:
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - boehme-network
    volumes:
      - ./apps/cms/media:/app/media

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: boehme-web
    restart: unless-stopped
    environment:
      PUBLIC_CMS_URL: ${PUBLIC_CMS_URL}
    ports:
      - "3001:3000"
    networks:
      - boehme-network

volumes:
  mongo_data:

networks:
  boehme-network:
    driver: bridge
